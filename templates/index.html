<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVault</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="top-controls">

    <input type="text" id="searchInput" placeholder="Search movies...">

    <select id="genreFilter">

        <option value="All">All Genres</option>
        <option value="Action">Action</option>
        <option value="Horror">Horror</option>
        <option value="Thriller">Thriller</option>
        <option value="Romantic">Romantic</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Comedy">Comedy</option>

    </select>

</div>
    <div class="container">

        <h1>🎬 MovieVault</h1>

        <form action="/add" method="POST" class="movie-form">

            <input type="text" name="movie" placeholder="Movie Name" required>

            <input type="text" name="director" placeholder="Director Name" required>

            <input type="number" name="year" placeholder="Release Year" required>
	    <input type="text"name="poster" placeholder="Poster Image URL"required>
            <select name="genre" required>
                <option value="">Select Genre</option>
                <option>Action</option>
                <option>Horror</option>
                <option>Thriller</option>
                <option>Romantic</option>
                <option>Sci-Fi</option>
                <option>Comedy</option>
            </select>

            <button type="submit">Add Movie</button>

        </form>

        <div class="movies">

            {% for movie in movies %}

            <div class="movie-card"
     data-title="{{ movie.movie }}"
     data-genre="{{ movie.genre }}">
		<img src="{{ movie.poster }}" class="poster">
                <h2>{{ movie.movie }}</h2>

                <p>🎥 {{ movie.director }}</p>

                <p>📅 {{ movie.year }}</p>

                <p>🎭 {{ movie.genre }}</p>

                <a href="/favorite/{{ movie.id }}" class="star">

                    {% if movie.favorite == "Yes" %}
                        ⭐
                    {% else %}
                        ☆
                    {% endif %}

                </a>
		<a href="/delete/{{ movie.movie }}" class="delete-btn">Delete</a>

            </div>

            {% endfor %}

        </div>

    </div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
